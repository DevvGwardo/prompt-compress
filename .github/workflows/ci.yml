name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check --all
      - name: cargo test
        run: cargo test --all

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml
      - name: Install Python SDK (dev mode)
        working-directory: sdk/python
        run: pip install -e ".[dev]"
      - name: Run Python SDK unit tests
        working-directory: sdk/python
        run: pytest tests/test_client.py tests/test_middleware.py -v

  hermes-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run hermes plugin tests
        run: PYTHONPATH=. pytest hermes_plugin/tests/test_plugin.py -v
